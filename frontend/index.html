<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EcoVolt · Smart Campus Energy</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-shell">
        <div class="auth-container">
            <div class="auth-header">
                <h1>Eco<span>Volt</span></h1>
                <p>Smart Campus Energy Management</p>
            </div>

            <div class="auth-tabs">
                <button class="tab-btn active" onclick="showTab('login')">Login</button>
                <button class="tab-btn" onclick="showTab('register')">Register</button>
            </div>

            <!-- LOGIN -->
            <div id="login-form" class="auth-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="you@campus.edu" autocomplete="email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
                </div>
                <div class="form-group">
                    <label>Sign in as</label>
                    <select id="login-role">
                        <option value="admin">Campus Administrator</option>
                        <option value="maintenance">Maintenance Staff</option>
                        <option value="management">University Management</option>
                    </select>
                </div>
                <button type="button" onclick="login()">Login</button>
                <div id="login-message" class="message"></div>
            </div>

            <!-- REGISTER -->
            <div id="register-form" class="auth-form" style="display:none;">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" placeholder="Jane Doe" autocomplete="name">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" placeholder="you@campus.edu" autocomplete="email">
                </div>
                <div class="form-group">
                    <label>Password (min 6 chars)</label>
                    <input type="password" id="reg-password" placeholder="••••••••" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label>Register as</label>
                    <select id="reg-role">
                        <option value="admin">Campus Administrator</option>
                        <option value="maintenance">Maintenance Staff</option>
                        <option value="management">University Management</option>
                    </select>
                </div>
                <button type="button" onclick="register()">Create Account</button>
                <div id="register-message" class="message"></div>
            </div>
        </div>
    </div>
    <script src="/js/auth.js"></script>
</body>
</html>
