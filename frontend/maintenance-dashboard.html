<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EcoVolt | Maintenance</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="navbar">
        <div class="logo">
            <img src="logo.png" alt="EcoVolt"
                onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%232fbf57%22/%3E%3Ctext x=%2250%22 y=%2265%22 text-anchor=%22middle%22 fill=%22%230b1f17%22 font-size=%2240%22 font-weight=%22bold%22%3EEV%3C/text%3E%3C/svg%3E'">
            <span>EcoVolt<span>Maintenance Console</span></span>
        </div>
        <div class="nav-links">
            <span id="roleBadge" class="role-badge"></span>
            <button onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="container">
        <h1 class="page-title">Maintenance Dashboard <small>Investigate &amp; resolve alerts</small></h1>

        <div class="stat-grid" id="statGrid"></div>

        <div class="card">
            <h2>🚨 Active Alerts — Action Required</h2>
            <div id="alertsList">Loading…</div>
        </div>

        <div class="card">
            <h2>✅ Recently Resolved</h2>
            <div id="resolvedList">Loading…</div>
        </div>

        <div class="card">
            <h2>💡 Latest Sensor Readings</h2>
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr><th>Time</th><th>Building</th><th>Room</th><th>Device</th><th>Occupied</th><th>Power (W)</th></tr>
                    </thead>
                    <tbody id="readingsBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/maintenance-dashboard.js"></script>
</body>
</html>
