<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoVolt - Live Dashboard</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <script>
    // Check if user is logged in
    const savedUser = localStorage.getItem('ecovolt_user');
    if (!savedUser) {
        window.location.href = '/login.html';
    }
</script>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-bolt"></i>
                <span>EcoVolt</span>
            </div>
            <div class="nav-links">
                <a href="index.html"><i class="fas fa-home"></i> Home</a>
                <a href="dashboard.html" class="active"><i class="fas fa-chart-line"></i> Dashboard</a>
                <a href="admin.html"><i class="fas fa-building"></i> Admin</a>
            </div>
            <div class="auth-buttons" id="authButtons">
                <button class="btn-login" onclick="showLoginModal()"><i class="fas fa-sign-in-alt"></i> Login</button>
                <button class="btn-register" onclick="showRegisterModal()"><i class="fas fa-user-plus"></i> Register</button>
            </div>
            <div class="user-info" id="userInfo" style="display: none;">
                <i class="fas fa-user-circle"></i>
                <span id="userName"></span>
                <button onclick="logout()" class="btn-logout"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1><i class="fas fa-chart-line"></i> Live Energy Dashboard</h1>
            <div class="live-badge">
                <i class="fas fa-circle"></i> LIVE DATA
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="dashboard-card">
                <div class="card-header">
                    <h3><i class="fas fa-bolt"></i> Current Energy Usage</h3>
                </div>
                <div class="card-body">
                    <div class="current-usage" id="currentUsage">0</div>
                    <div class="usage-unit">Watts</div>
                    <div class="usage-status" id="usageStatus">Normal</div>
                </div>
            </div>

            <div class="dashboard-card">
                <div class="card-header">
                    <h3><i class="fas fa-users"></i> Active Rooms</h3>
                </div>
                <div class="card-body">
                    <div class="active-rooms" id="activeRooms">0</div>
                    <div class="rooms-total">Total Rooms: <span id="totalRooms">0</span></div>
                </div>
            </div>

            <div class="dashboard-card wide">
                <div class="card-header">
                    <h3><i class="fas fa-chart-line"></i> Energy Consumption Trend</h3>
                </div>
                <div class="card-body">
                    <canvas id="energyChart"></canvas>
                </div>
            </div>

            <div class="dashboard-card wide">
                <div class="card-header">
                    <h3><i class="fas fa-bell"></i> Recent Alerts</h3>
                    <button onclick="refreshAlerts()" class="btn-refresh"><i class="fas fa-sync-alt"></i></button>
                </div>
                <div class="card-body">
                    <div class="alerts-list" id="alertsList">
                        <p class="no-alerts">No active alerts</p>
                    </div>
                </div>
            </div>

            <div class="dashboard-card">
                <div class="card-header">
                    <h3><i class="fas fa-building"></i> Building Summary</h3>
                </div>
                <div class="card-body">
                    <div id="buildingSummary"></div>
                </div>
            </div>

            <div class="dashboard-card">
                <div class="card-header">
                    <h3><i class="fas fa-tachometer-alt"></i> Top Energy Consumers</h3>
                </div>
                <div class="card-body">
                    <div id="topConsumers"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeLoginModal()">&times;</span>
            <h2><i class="fas fa-sign-in-alt"></i> Login</h2>
            <form id="loginForm">
                <input type="email" placeholder="Email" id="loginEmail" required>
                <input type="password" placeholder="Password" id="loginPassword" required>
                <button type="submit" class="btn-submit">Login</button>
            </form>
        </div>
    </div>

    <div id="registerModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeRegisterModal()">&times;</span>
            <h2><i class="fas fa-user-plus"></i> Register</h2>
            <form id="registerForm">
                <input type="text" placeholder="Full Name" id="regName" required>
                <input type="email" placeholder="Email" id="regEmail" required>
                <input type="password" placeholder="Password" id="regPassword" required>
                <select id="regRole">
                    <option value="admin">Administrator</option>
                    <option value="maintenance">Maintenance Staff</option>
                    <option value="management">University Management</option>
                </select>
                <button type="submit" class="btn-submit">Register</button>
            </form>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/socket.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
